# Port du serveur Spring Boot
# L'application sera accessible sur http://localhost:8082
server.port=8082

# Configuration de la base de donnees MySQL
# Nom de la base : auth_db
spring.datasource.url=jdbc:mysql://localhost:3306/auth_db?useSSL=false&serverTimezone=UTC

# Identifiants de connexion a la base
spring.datasource.username=root
spring.datasource.password=

# Driver JDBC pour MySQL
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Configuration JPA / Hibernate

# Mise a jour automatique des tables (creer/modifier si besoin)
spring.jpa.hibernate.ddl-auto=update

# Affiche les requetes SQL dans la console (utile pour debug)
spring.jpa.show-sql=true

# Dialecte Hibernate pour MySQL
# Permet a Hibernate de generer le bon SQL
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect