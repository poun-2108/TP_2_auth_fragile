name: Build

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  sonarqube:
    name: SonarQube
    runs-on: windows-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Donner le droit a mvnw
        run: chmod +x mvnw
        shell: bash

      - name: Build + SonarCloud
        run: ./mvnw clean package -DskipTests sonar:sonar -Dsonar.projectKey=poun-2108_TP_2_auth_fragile -Dsonar.organization=poun-2108 -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
        shell: bash
