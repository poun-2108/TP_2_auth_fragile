name: Build and SonarCloud

on:
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_dispatch:

jobs:
  sonarqube:
    name: Build and SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Donner les droits a mvnw
        run: chmod +x mvnw

      - name: Build + Tests + SonarCloud
        run: ./mvnw clean verify sonar:sonar -Dsonar.projectKey=poun-2108_tp-2-auth-fragile -Dsonar.organization=poun-2108 -Dsonar.host.url=https://sonarcloud.io -Dsonar.token=${{ secrets.SONAR_TOKEN }} -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}