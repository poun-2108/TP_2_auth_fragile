name: Build and SonarCloud

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  sonarqube:
    name: Build and SonarCloud
    runs-on: ubuntu-latest

    steps:
      - name: Recuperer le code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Installer Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
          cache: maven

      - name: Donner les droits a mvnw
        run: chmod +x mvnw

      - name: Build + Tests + JaCoCo
        run: ./mvnw clean verify

      - name: Analyse SonarCloud
        run: ./mvnw sonar:sonar -Dsonar.projectKey=poun-2108_TP_2_auth_fragile -Dsonar.organization=poun-2108 -Dsonar.host.url=https://sonarcloud.io
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}